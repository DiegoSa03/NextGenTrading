<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGen Trading</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>NextGen Trading <span style="font-size: 1.5rem">✨</span></h1>
            <div id="market-status" class="status-badge">Checking market...</div>
        </header>

        <main>
            <div class="dashboard-grid">
                <!-- Portfolio Summary -->
                <div class="card summary-card">
                    <h2>📊 Total Portfolio Value</h2>
                    <h1 id="total-value" class="mint-text">$0.00</h1>
                    <p style="color: var(--text-muted); font-size: 0.95rem;">Available Cash: <span id="available-cash" style="color: #fff; font-weight: 600;">$0.00</span></p>
                    <div class="chart-container">
                        <canvas id="portfolioChart"></canvas>
                    </div>
                </div>

                <!-- Action Panel (Buy/Sell) -->
                <div class="card action-card">
                    <h2>⚡ Trade Execution</h2>
                    <div class="form-group">
                        <label>TICKER SYMBOL</label>
                        <input type="text" id="trade-ticker" placeholder="e.g. AAPL, TSLA" style="text-transform:uppercase">
                    </div>
                    <div class="form-group">
                        <label>SHARES TO TRADE</label>
                        <input type="number" id="trade-shares" placeholder="1" min="1">
                    </div>
                    <div class="button-group">
                        <button id="btn-buy" class="btn btn-buy">Buy Shares</button>
                        <button id="btn-sell" class="btn btn-sell">Sell Shares</button>
                    </div>
                    <p id="trade-message" class="message"></p>
                </div>

                <!-- Holdings Table -->
                <div class="card holdings-card">
                    <h2>💼 Current Holdings</h2>
                    <table id="holdings-table">
                        <thead>
                            <tr>
                                <th>Asset Ticker</th>
                                <th>Shares Owned</th>
                                <th>Current Market Price</th>
                                <th>Total Position Value</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>

                <!-- Time Machine -->
                <div class="card time-card">
                    <h2>⏱️ Time Machine</h2>
                    <p style="color: var(--text-muted); margin-bottom: 1.5rem; font-size: 0.9rem;">Simulate past investments with real historical data.</p>
                    <div class="form-group">
                        <label>ASSET TICKER</label>
                        <input type="text" id="time-ticker" placeholder="NVDA" style="text-transform:uppercase">
                    </div>
                    <div class="form-group">
                        <label>INVESTMENT AMOUNT ($)</label>
                        <input type="number" id="time-amount" placeholder="1000">
                    </div>
                    <div class="form-group">
                        <label>YEARS IN THE PAST</label>
                        <input type="number" id="time-years" placeholder="3" min="1" max="20">
                    </div>
                    <button id="btn-timemachine" class="btn btn-time">Simulate Investment</button>
                    <div id="time-result" class="time-result"></div>
                </div>

            </div>
        </main>
    </div>

    <script src="/static/main.js"></script>
</body>
</html>
